<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Recibo</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page">
    <section class="workspace" aria-label="Sistema de recibo">
      <aside class="panel" aria-label="Controles do recibo">
        <div>
          <p class="eyebrow">Recibo online</p>
          <h1>Sistema de recibo</h1>
          <p class="support">Preencha o recibo na tela, imprima e avance a numeração quando precisar.</p>
        </div>

        <label class="control">
          <span>Número atual</span>
          <input id="counterInput" type="number" min="1" step="1" inputmode="numeric">
        </label>

        <div class="button-grid">
          <button type="button" id="saveCounter">Salvar nº</button>
          <button type="button" id="previousNumber">Voltar</button>
          <button type="button" id="nextNumber">Próximo</button>
          <button type="button" id="clearReceipt">Limpar</button>
        </div>

        <button class="primary" type="button" id="printReceipt">Imprimir recibo</button>

        <p class="hint">A numeração fica salva neste navegador e aparece com pelo menos quatro dígitos, como 0001.</p>
      </aside>

      <section class="receipt-shell" aria-label="Prévia do recibo">
        <form class="receipt" id="receiptForm">
          <div class="receipt-frame">
            <header class="receipt-header">
              <strong>RECIBO</strong>
              <label>
                <span>Nº</span>
                <input id="receiptNumber" type="text" readonly aria-label="Número do recibo">
              </label>
              <label>
                <span>VALOR</span>
                <input id="amount" type="text" inputmode="decimal" autocomplete="off" data-save data-clearable aria-label="Valor">
              </label>
            </header>

            <div class="receipt-body">
              <label class="line">
                <span>Recebi(emos) de</span>
                <input id="receivedFrom" type="text" autocomplete="name" data-save data-clearable>
              </label>

              <label class="line stacked">
                <span>a quantia de</span>
                <textarea id="amountWords" rows="2" data-save data-clearable></textarea>
              </label>

              <label class="line stacked">
                <span>Referente a</span>
                <textarea id="description" rows="2" data-save data-clearable></textarea>
              </label>

              <div class="declaration">e para clareza firmo(amos) o presente.</div>

              <div class="date-row">
                <input id="city" type="text" placeholder="Cidade" data-save data-clearable aria-label="Cidade">
                <span>,</span>
                <input id="day" type="text" maxlength="2" inputmode="numeric" data-save aria-label="Dia">
                <span>de</span>
                <input id="month" type="text" data-save aria-label="Mês">
                <span>de</span>
                <input id="year" type="text" maxlength="4" inputmode="numeric" data-save aria-label="Ano">
              </div>

              <label class="line">
                <span>Assinatura</span>
                <input id="signature" type="text" data-save data-clearable>
              </label>

              <label class="line">
                <span>Emitente</span>
                <input id="issuer" type="text" data-save data-clearable>
              </label>

              <div class="document-row">
                <label class="line">
                  <span>CPF</span>
                  <input id="cpf" type="text" inputmode="numeric" data-save data-clearable>
                </label>
                <label class="line">
                  <span>RG</span>
                  <input id="rg" type="text" data-save data-clearable>
                </label>
              </div>
            </div>
          </div>
        </form>
      </section>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
